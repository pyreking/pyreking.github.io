# Permalinks
permalink:           pretty

# Setup
title:               Austin Guiney
tagline:             "Inside the mind of Austin Guiney!"
baseurl:             ""
paginate:            10

exclude: [Rakefile, _posts/LICENSE.md, _data/comments/LICENSE.md]

# Name of repository, for use with Staticman
repository: "pyreking/pyreking.github.io"

# Staticman comments (see staticman.yml for configuration).
staticman:
  branch: "master"

# Assets
#
# We specify the directory for Jekyll so we can use @imports.
sass:
  sass_dir:          _sass
  style:            :compressed

# About/contact
author:
  name:              Austin Guiney
  url:               https://twitter.com/SenorKoffey
  email:             austin.guiney@gmail.com

# Gems
plugins:
  - jekyll-gist
  - jekyll-archives
  - jekyll-sitemap
  - jekyll-paginate
  
# Post preview
excerpt_separator: <!--more-->

jekyll-archives:
  enabled:
    - year
    - month
    - day
    - tags
  layouts:
    year: year
    month: month
    day: day
    tag: tag
  permalinks:
    year: '/:year/'
    month: '/:year/:month/'
    day: '/:year/:month/:day/'
    tag: '/tag/:name/'
    
compress_html:
  clippings: []
  comments: all
  endings: []
  ignore:
    envs: []
  blanklines: true
  profile: false
  startings: []
