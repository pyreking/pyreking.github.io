---
layout: default
---
<h2 class="post_title">{{page.title}}</h2>
<ul>
  {% for post in site.posts %}
  {% for tag in post.tags %}
  {% if tag == page.tag %}
  <li class="archive_list">
    <a class="archive_list_article_link" href='{{site.baseurl}}{{post.url}}'>{{post.title}}</a> ({{ post.date | date: '%m/%d/%y' }})
  </li>
  {% endif %}
  {% endfor %}
  {% endfor %}
</ul>
