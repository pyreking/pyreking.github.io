<h1>Posts from {{ page.date | ordinal }}</h1>

<ul class="posts">
{% for post in page.posts %}
<li class="no-bullets">
<h2>
    <a href="{{ post.url | prepend: site.baseurl }}">{{ post.title }}</a>
</h2>
</li>
{% endfor %}
</ul>
