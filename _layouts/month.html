---
layout: default
---

<h1>Archive of posts from {{ page.date | date: "%B %Y" }}</h1>

<ul class="posts">

<!-- Sort posts by date in ascending order -->
{% assign sorted = page.posts | sort:"date" %}

<!-- Loop through each sorted post -->
{% for post in sorted %}
<h3>
    <span class="archive-month-date">{{ post.date | monthordinal }}</span>
    </h3>
   <li><a class="archive-month-title" href="{{ post.url | prepend: site.baseurl }}">{{ post.title }}</a>
  </li>
{% endfor %}
</ul>
