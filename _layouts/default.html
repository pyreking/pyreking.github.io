<!DOCTYPE html>
<html lang="en">
<!-- Load the external HTML header -->
  {% include head.html %}
  <!-- Load the external stylsheet for searching -->
  <body>
    <div class="container content">
      <header class="masthead">
        <h3 class="masthead-title">
        
	<!-- Home link-->
		<a href="{{ site.baseurl }}/" title="Home">{{ site.title }}</a>
	
	<!-- Archive link -->
    <span class="spacing">
	<a href="/archive/" title="Look at my old posts!">
	<small><svg class="header-archive"><use href="/assets/img/svg/sprite.defs.svg#archive"></use></svg></small></a>
	</span>
		
	<!-- Search icon -->
	<span class="spacing">
	<a href="javascript:void(0);" title="Search the website!" onclick="toggleSearch();" class="search-btn">
	<svg class="header-search" style="vertical-align: 1px;"><use href="/assets/img/svg/sprite.defs.svg#search"></use></svg></a>
	</span>
	
	<!-- Atom feed -->
	<span class="spacing">
	<a href="/atom.xml" title="Subscribe to my feed!">
	<svg class="header-feed"><use href="/assets/img/svg/sprite.defs.svg#feed"></use></svg></a>
	</span>
	
	<!-- Audio feed -->
	<span class="spacing">
	<a href="/audio.xml" title="Listen to my blog!">
	<svg class="header-headphones"><use href="/assets/img/svg/sprite.defs.svg#headphones"></use></svg></a>
	</span>
	
	<!-- Newsletter -->
	<span class="spacing">
	<a href="/newsletter/" title="Subscribe to my newsletter!">
	<svg class="header-newspaper" style="vertical-align: 1px;"><use href="/assets/img/svg/sprite.defs.svg#newspaper"></use></svg></a>
	</span>
	
	<!-- Search JS/CSS -->
	 <div class="super-search" id="js-super-search">
  <a href="javascript:void(0);" onclick="superSearch.toggle();" class="super-search__close-btn">
  
  <!-- Close search icon -->
<svg class="icon-close-search" style="height:48px;width:48px;"><use href="/assets/img/svg/sprite.defs.svg#close-search"></use></svg></a>

<!-- Search field -->
  <input type="text" placeholder="Search" class="super-search__input" id="js-super-search__input">
  <ul class="super-search__results" id="js-super-search__results"></ul>
 </div>
 </h3>
 </header>
      
	<!-- Main content -->
      <main> {{ content }} </main>
	<br>
	<div style="text-align: center;">
	<!-- Copyright Disclaimer -->
      <footer class="footer">
    <small>
	<div><a href="{{ site.baseurl }}/privacy/">Privacy Policy</a></div>
	
	<div>Website text released under the <a rel="license" href="http://creativecommons.org/licenses/by-nc-nd/4.0/">
	<span class="implied">CC BY-NC-ND</span></a> license by <a class="fn url" prefix="cc: http://creativecommons.org/ns#" href="https://www.austinguiney.com" property="cc:attributionName" rel="cc:attributionURL">Austin Guiney</a>.</div>
	
	<div>Website software released under the <a href="https://github.com/pyreking/pyreking.github.io/tree/source">MIT License</a>.</div>
	</small>
      </footer>
      </div>
    </div>
  <!-- Load external search script -->
 <script src="/assets/js/ss.js"></script>
 <script>superSearch({});</script>
</body>
</html>
