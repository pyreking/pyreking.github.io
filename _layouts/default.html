<!DOCTYPE html>
<html lang="en">

  {% include head.html %}

  <body>

    <div class="container content">
      <header class="masthead">
        <h3 class="masthead-title">
          <a href="{{ site.baseurl }}/" title="Home">{{ site.title }}</a>

	<!-- Generate page links -->
	{% for page in site.pages_list %}
	&nbsp;&nbsp;&nbsp;
	<small><a href="{{ page[1]  }}">{{ page[0] }}</a></small>
	{% endfor %}
        </h3>
      </header>

      <main> {{ content }} </main>

	<!-- Comments section -->
     {% include comments.html %}
	<br>
	<!-- Copyright Disclaimer -->
      <footer class="footer">
      <small>
	<center>
	<a rel="license" href="http://creativecommons.org/licenses/by-nc-sa/4.0/" target="_blank><span class="implied"> <!--<img class="icon icon-cc" src="/images/cc.png" alt="Creative Commons" width="20" height="20">-->CC BY-NC-SA</span></a> by <a class="fn url" prefix="cc: http://creativecommons.org/ns#" href="http://austinguiney.com" property="cc:attributionName" rel="cc:attributionURL">Austin Guiney</a> unless otherwise noted.
        </small>
	</center>
      </footer>
    </div>
	
	<!-- Google Analytics -->
    {% include google_analytics.html %}
  </body>
</html>
