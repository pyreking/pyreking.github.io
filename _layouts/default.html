---
layout: compress
---
<!DOCTYPE html>
<html lang="en">
<!-- Load the external HTML header -->
  {% include head.html %}
  <!-- Load the external stylsheet for searching -->
  <body>
    <div class="container content">
      <header class="masthead">
        <h3 class="masthead-title">
        
	<!-- Home link-->
		<a href="{{ site.baseurl }}/" title="Home">{{ site.title }}</a>
          
	<!-- Archive link -->
		&nbsp;&nbsp;&nbsp;
		<a href="/archive/" title="Look at my old posts">
		<small><svg class="icon-archive"><use xlink:href="/assets/img/svg/sprite.defs.svg#svg--archive"></use></svg></small></a>
          
	<!-- Atom feed -->
		&nbsp;&nbsp;&nbsp;
		<a href="/atom.xml" title="Subscribe to my Atom feed">
		<svg class="icon-feed"><use xlink:href="/assets/img/svg/sprite.defs.svg#svg--feed"></use></svg></a>
	
	<!-- Click on the search icon to search -->
	&nbsp;&nbsp;&nbsp;
	<a href="javascript:void(0);" title="Search the website (press '/' to bring this up)" onclick="toggleSearch();" class="search-btn">
	<svg class="icon-search" style="vertical-align: 1px;"><use xlink:href="/assets/img/svg/sprite.defs.svg#svg--search"></use></svg></a>
	
	<!-- Newsletter -->
	&nbsp;&nbsp;&nbsp;
	<a href="/newsletter/" title="Subscribe to my newsletter">
	<svg class="icon-newspaper" style="vertical-align: 1px;"><use xlink:href="/assets/img/svg/sprite.defs.svg#svg--newspaper2"></use></svg></a>
	
	<!-- Press / to search -->
	 <div class="super-search" id="js-super-search">
  <a href="javascript:void(0);" onclick="superSearch.toggle();" class="super-search__close-btn">
  
  <!-- Close icon for search -->
<svg class="icon-close-search" style="height:48px;width:48px;"><use xlink:href="/assets/img/svg/sprite.defs.svg#svg--close-search"></use></svg></a>

<!-- Text field for search -->
  <input type="text" placeholder="Type here to search" class="super-search__input" id="js-super-search__input">
  <ul class="super-search__results" id="js-super-search__results"></ul>
 </div>

<!-- Load external search script -->
 <script src="/assets/js/ss.js" async></script>
 <script>superSearch({ });</script>
 </h3>
 </header>
      
	<!-- Main content -->
      <main> {{ content }} </main>
	<br>
	<div style="text-align: center;">
	<!-- Copyright Disclaimer -->
      <footer class="footer">
    <small>
	<div><a href="{{ site.baseurl }}/privacy/">Privacy Policy</a></div>
	
	<div>Website licensed under <a rel="license" href="http://creativecommons.org/licenses/by-nc-sa/4.0/" target="_blank">
	<span class="implied">CC BY-NC-SA</span></a> by <a class="fn url" prefix="cc: http://creativecommons.org/ns#" href="http://austinguiney.com" property="cc:attributionName" rel="cc:attributionURL">Austin Guiney</a>.</div>
	
	<p>Some webpages may be not be subject to the aforementioned license.</p>
	
	</small>
      </footer>
      </div>
    </div>
  </body>
</html>
