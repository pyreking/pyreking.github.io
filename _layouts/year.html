---
layout: default
---

<h1>Archive of posts from {{ page.date | date: "%Y" }}</h1>

<ul class="posts">
{% for post in page.posts %}
  <h3>
    <span class="archive-date">{{ post.date | date: "%b %-d, %Y" }}</span>
    </h3>
    <li>
    <a class="archive-title" href="{{ post.url | prepend: site.baseurl }}">{{ post.title }}</a>
  </li>
{% endfor %}
</ul>
