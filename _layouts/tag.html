---
layout: default
---
<h1>Posts tagged “{{ page.title }}”</h1>
<ul class="posts">
  {% for post in page.posts %}
    <li class="no-bullets">
     <a href="{{ post.url | prepend: site.baseurl }}">
      <h2>
      <span>{{ post.title }}</a></span></h2>
      <span><date datetime="{{ post.date | date_to_xmlschema }}" class="post-date"> {{ post.date | ordinal }}</time></span>
    </li>
  {% endfor %}
</ul>
