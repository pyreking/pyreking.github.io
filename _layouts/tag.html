---
layout: default
---
<h2>Posts tagged “{{ page.title }}”</h2>
<ul class="posts">
  {% for post in page.posts %}
    <li class="archive_list">
     <a class="archive_list_article_link" href="{{ post.url | prepend: site.baseurl }}">
      <span class="archive-title">{{ post.title }}</a></span>
      <span class="archive-date">{{ post.date | date: "%b %-d, %Y" }}</span>
    </li>
  {% endfor %}
</ul>
