---
layout: default
title: Posts by date
permalink: /archive/date/
---
<h1>{{page.title}}</h1>
  {% for post in site.posts %}
    <h2>
      <a href="{{ post.url }}">
        {{ post.title }}
      </a>
    </h2>
    <span><time datetime="{{ post.date | date_to_xmlschema }}" class="post-date">{{ post.date | ordinal }}</time></span>
{% endfor %}
