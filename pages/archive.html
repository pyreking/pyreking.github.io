---
layout: default
title: Archive
permalink: /archive/
---
<h1>{{page.title}}</h2>
  {% for post in site.posts %}
    <h2>
      <a href="{{ post.url }}">
        {{ post.title }}
      </a>
    </h2>
    <time datetime="{{ post.date | date_to_xmlschema }}">{{ post.date | ordinal }}</time>
{% endfor %}
