<link rel="stylesheet" href="/../../../css/switch.css">
<script src="/../../../js/hide-table.js"></script>

{% unless page.comments_locked == true %}
<!-- Comment form -->
<h3>Leave a comment</h3>
<form method="POST" action="https://api.staticman.net/v2/entry/{{ site.repository }}/{{ site.staticman.branch }}/comments">
  <input name="options[redirect]" type="hidden" value="{{ page.url | absolute_url }}">
  <input name="options[slug]" type="hidden" value="{{ page.slug }}">
  <div>
    <legend><h4>Name</h4></legend>
    <input name="fields[name]" type="text">
  </div>
  
  <input type="hidden" id="comment-replying-to" name="fields[replying_to]" value="">
  <input type="hidden" id="comment-post-id" name="options[slug]" value="{{ page.slug }}">
  
  <div>
   <h4 style="display:inline-block;">Message</h4> formatting help

    <!-- Markdown help switch-->
    <div class="onoffswitch">
        <input type="checkbox" name="onoffswitch" class="onoffswitch-checkbox" id="myonoffswitch">
        <label class="onoffswitch-label" for="myonoffswitch">
            <span class="onoffswitch-inner"></span>
            <span class="onoffswitch-switch"></span>
        </label>
    </div>

    
    {% include kramdown_help.html %}
    
    <!-- Message box -->
    <textarea style="width:100%" name="fields[message]" rows="12"></textarea>
  </div>
  
  <div>
    <legend>Comments will appear after moderation.</legend>
    <button type="submit">Submit Comment</button>
  </div>
</form>
{% else %}
<p class="important">Comments are closed.</p>
{% endunless %}
